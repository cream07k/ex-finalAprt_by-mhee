# ════════════════════════════════════════════
#  /etc/nginx/sites-available/apt-utility
#  symlink: ln -s ../sites-available/apt-utility /etc/nginx/sites-enabled/
#
#  ใช้ Certbot ออก SSL ฟรี:
#    sudo certbot --nginx -d mhee.online -d www.mhee.online
# ════════════════════════════════════════════

# ── Rate limit zones ──
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;     # login = 5 req/นาที
limit_req_zone $binary_remote_addr zone=api:10m    rate=60r/m;    # api   = 60 req/นาที
limit_req_zone $binary_remote_addr zone=general:10m rate=200r/m;  # ทั่วไป = 200 req/นาที

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    listen [::]:80;
    server_name mhee.online www.mhee.online;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mhee.online www.mhee.online;

    # SSL (Certbot จะใส่ให้อัตโนมัติ)
    # ssl_certificate     /etc/letsencrypt/live/mhee.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/mhee.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # ── Logs ──
    access_log /var/log/nginx/apt-access.log;
    error_log  /var/log/nginx/apt-error.log warn;

    # ── Limits ──
    client_max_body_size 6M;       # อัปสลิป 5MB + buffer
    client_body_timeout  60s;
    keepalive_timeout    65s;

    # ── Security headers (ซ้ำกับ Next.js แต่ใส่ที่ nginx ก็ดี) ──
    add_header X-Frame-Options          "DENY" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # ── ปิด sensitive paths ──
    location ~ /\.(env|git|next|prisma) {
        deny all;
        return 404;
    }

    # ── Login: rate limit เข้มข้น ──
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── API ──
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Next.js static + page ──
    location / {
        limit_req zone=general burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;

        # cache _next/static นาน 1 ปี (immutable)
        location /_next/static/ {
            proxy_pass http://127.0.0.1:3000;
            include /etc/nginx/proxy_params;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable" always;
        }
    }
}
